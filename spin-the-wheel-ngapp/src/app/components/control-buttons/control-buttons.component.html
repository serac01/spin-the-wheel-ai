<div class="controls" *ngIf="canCompare">
  <button (click)="compare()">Generate other</button>
  <button (click)="restart()" class="ms-2">Restart</button>
</div>
<div class="controls" *ngIf="canRestart">
  <button *ngIf="!isComparingScenarios" (click)="compareScenario()" class="ms-2">Compare scenarios</button>
  <button (click)="restart()" class="ms-2">Restart</button>
</div>
